name: tark_peer
description: Random voice call app - Tark Peer

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  supabase_flutter: ^2.5.6
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1
  web_socket_channel: ^2.4.0
  go_router: ^14.1.4
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
